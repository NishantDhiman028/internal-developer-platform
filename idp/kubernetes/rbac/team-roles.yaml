# Developer role - can deploy and view in their namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer
  namespace: dev-team-a
rules:
- apiGroups: ["", "apps", "batch"]
  resources: ["deployments", "services", "pods", "configmaps", "jobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["pods/log", "pods/exec"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-team-a-developers
  namespace: dev-team-a
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: developer
subjects:
- kind: Group
  name: team-a-developers
  apiGroup: rbac.authorization.k8s.io
---
# Team lead role - full namespace access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: team-lead
  namespace: dev-team-a
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dev-team-a-leads
  namespace: dev-team-a
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: team-lead
subjects:
- kind: Group
  name: team-a-leads
  apiGroup: rbac.authorization.k8s.io
