# All containers must have resource limits
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: enforce
  background: true
  rules:
  - name: require-limits
    match:
      any:
      - resources:
          kinds: ["Deployment"]
          namespaces: ["dev-*", "staging", "production"]
    validate:
      message: "CPU and memory limits are required for all containers. See golden-paths/ for templates."
      pattern:
        spec:
          template:
            spec:
              containers:
              - resources:
                  limits:
                    memory: "?*"
                    cpu: "?*"
                  requests:
                    memory: "?*"
                    cpu: "?*"
