# Prevent :latest tag in production
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag in Production
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      The :latest image tag must not be used in staging or production
      as it leads to unpredictable deployments.
spec:
  validationFailureAction: enforce
  background: true
  rules:
  - name: require-image-tag
    match:
      any:
      - resources:
          kinds: ["Deployment"]
          namespaces: ["staging", "production"]
    validate:
      message: "Image tag ':latest' is not allowed in staging/production. Use a specific version tag."
      foreach:
      - list: "request.object.spec.template.spec.containers"
        deny:
          conditions:
            any:
            - key: "{{element.image}}"
              operator: Equals
              value: "*:latest"
            - key: "{{element.image}}"
              operator: NotContains
              value: ":"
