# The "App of Apps" pattern - ArgoCD manages itself
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idp-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: "https://github.com/YOUR_USERNAME/internal-developer-platform"
    targetRevision: HEAD
    path: argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
