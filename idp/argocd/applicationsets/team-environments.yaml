# Automatically creates ArgoCD applications for every team/environment combination
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: team-environments
  namespace: argocd
spec:
  generators:
  - matrix:
      generators:
      - list:
          elements:
          - team: payments-team
            namespace: dev-team-a
          - team: checkout-team
            namespace: dev-team-b
      - list:
          elements:
          - environment: dev
            revision: HEAD
          - environment: staging
            revision: release
  template:
    metadata:
      name: "{{team}}-{{environment}}"
      namespace: argocd
    spec:
      project: platform
      source:
        repoURL: "https://github.com/YOUR_USERNAME/internal-developer-platform"
        targetRevision: "{{revision}}"
        path: "golden-paths/nodejs-service/template"
        helm:
          valueFiles:
          - "values-{{environment}}.yaml"
          parameters:
          - name: team
            value: "{{team}}"
          - name: environment
            value: "{{environment}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
