# Default values - override per environment
team: ""
environment: dev
appName: ""

replicaCount: 1

image:
  repository: nginx  # Replace with your image
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Health checks (Golden Path enforces these exist)
livenessProbe:
  httpGet:
    path: /health/live
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /health/ready
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10

# Security context (Golden Path enforces least privilege)
securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

# Observability (structured logging + metrics)
observability:
  logFormat: json
  metricsPort: 9090
  tracingEnabled: true

# Environment-specific overrides
envVars: {}

ingress:
  enabled: false
  host: ""
